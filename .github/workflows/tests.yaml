name: Tests

on:
    push:
        branches: [develop]
    pull_request:
        branches: [develop]
jobs:
    test:
        name: Tests
        runs-on: ubuntu-latest

        services:
            database:
                image: mariadb:10.7
                env:
                    MARIADB_ROOT_PASSWORD: root
                    MARIADB_DATABASE: app_test
                ports:
                    - 3306/tcp
                options: >-
                    --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.3
                  tools: composer:v2

            - name: Setup Cache
              run: echo "COMPOSER_CACHE_DIR=$(composer config cache-dir)" >> $GITHUB_ENV

            - name: Cache deps
              uses: actions/cache@v4
              with:
                  path: ${{ env.COMPOSER_CACHE_DIR }}
                  key: php8.3-composer-${{ hashFiles('**/composer.lock') }}
                  restore-keys: php8.3-composer-

            - name: Install deps
              run: make install

            - name: Wait for DB
              run: |
                  for i in {1..10}; do
                    nc -z 127.0.0.1 ${{ job.services.database.ports['3306'] }} && echo "DB ready" && exit 0
                    echo "Waiting for DB..."
                    sleep 3
                  done
                  echo "DB not ready" && exit 1

            - name: Run tests
              run: make test
              env:
                  APP_ENV: test
                  DATABASE_URL: mysql://root:root@127.0.0.1:${{ job.services.database.ports['3306'] }}/app_test
